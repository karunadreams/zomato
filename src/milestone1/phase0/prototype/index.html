<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato AI - Restaurant Recommendation Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #cb202d;
            --primary-dark: #a81a25;
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1c1c1c;
            --text-muted: #696969;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #dee2e6;
            background: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(203, 32, 45, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e9ecef;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="badge">Phase 0 - Prototype</div>
            <h1>Zomato AI</h1>
            <p>Your personalized restaurant recommendation assistant</p>
        </header>

        <main>
            <div class="input-card">
                <form id="preferencesForm">
                    <div class="form-group">
                        <label for="location">Location</label>
                        <select id="location" required>
                            <option value="">Select a city</option>
                            <option value="delhi">New Delhi</option>
                            <option value="mumbai">Mumbai</option>
                            <option value="bangalore">Bangalore</option>
                        </select>
                    </div>

                    <div class="grid">
                        <div class="form-group">
                            <label for="budget">Budget</label>
                            <select id="budget" required>
                                <option value="low">Low (₹)</option>
                                <option value="medium">Medium (₹₹)</option>
                                <option value="high">High (₹₹₹)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="rating">Min Rating</label>
                            <input type="number" id="rating" min="1" max="5" step="0.1" value="4.0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="cuisine">Preferred Cuisine(s)</label>
                        <input type="text" id="cuisine" placeholder="e.g. North Indian, Italian, Chinese" required>
                    </div>

                    <div class="form-group">
                        <label for="context">Additional Context (Optional)</label>
                        <textarea id="context" rows="3" placeholder="e.g. Romantic setting, Outdoor seating, Family friendly..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Find Recommendations</button>
                </form>
            </div>
        </main>

        <footer>
            &copy; 2026 AI-Powered Restaurant Recommendation System | Milestone 1
        </footer>
    </div>

    <script>
        document.getElementById('preferencesForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Form submitted! In later phases, this will trigger the retrieval and LLM ranking process.');
        });
    </script>
</body>
</html>
